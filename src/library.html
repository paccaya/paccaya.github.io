<h3>Ryan's Articles</h3>

<script>
document.addEventListener("DOMContentLoaded", function () {
  let wrapper = document.querySelector(".poem-wrapper");
  let poems = document.querySelectorAll(".poem-card");
  let currentIndex = 0;

  function updateCarousel() {
    let offset = -currentIndex * 100; // Move the wrapper left by 100% for each poem
    wrapper.style.transform = `translateX(${offset}%)`;
  }

  document.getElementById("nextBtn").addEventListener("click", function () {
    currentIndex = (currentIndex + 1) % poems.length;
    updateCarousel();
  });

  document.getElementById("prevBtn").addEventListener("click", function () {
    currentIndex = (currentIndex - 1 + poems.length) % poems.length;
    updateCarousel();
  });

  updateCarousel(); // Set initial position
});

</script>
